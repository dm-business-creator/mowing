<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - DM Mowing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: #0f0f10;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(20,20,20,0.8);
    backdrop-filter: blur(10px);
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 60px 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #1a1a1a;
    border: none;
    color: white;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.info {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<header>
    <strong>DM Mowing</strong>
    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">

    <h1>Contact Me</h1>

    <div class="info">
        📍 Gleeson Pl, Abbotsbury only<br>
        👦 Damien — 14 years old<br>
        📧 Fast email replies (usually within 24h)
    </div>

    <!-- FORM SUBMIT ENABLED -->
    <form action="https://formsubmit.co/damien_moser@icloud.com" method="POST">
        <!-- disables captcha (optional) -->
        <input type="hidden" name="_captcha" value="false">

        <!-- optional subject -->
        <input type="hidden" name="_subject" value="New DM Mowing Booking Request!">

        <!-- optional redirect -->
        <input type="hidden" name="_next" value="https://thankyou.page">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="text" name="address" placeholder="Your Address" required>

        <textarea name="message" rows="5" placeholder="What do you need done?" required></textarea>

        <button type="submit">Send Booking Request</button>

    </form>

</div>

</body>
</html>
